site_name: Omni Docs
site_description: Personal reference for systems, languages, ML topics, and guides.

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Languages:
    - Python: languages/python.md
  - Guides:
    - MkDocs: guides/mkdocs.md
    - Git: guides/git.md
  - Systems: []
  - Concepts: []
